<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Liquid Glass Cat - Obsidian Edition</title>
    <!-- 
        WHITE LIQUID GLASS CAT CLICKER 
        ------------------------------
        A high-fidelity Three.js experience featuring:
        - Physically Based Rendering (PBR) for Glass
        - Custom Web Audio API for "Myats" sound
        - Dynamic lighting and particle systems
        - Advanced UI with backdrop filters
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');

        :root {
            --accent: #222222;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow: rgba(0, 0, 0, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa; /* Светлый фон для контраста белого стекла */
            color: #1a1a1a;
            font-family: 'Plus Jakarta Sans', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анимированный градиент на фоне для эффекта глубины */
        #bg-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, #e2e8f0 100%);
            z-index: 0;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.1));
        }

        /* UI КОНТЕЙНЕР */
        #ui-layer {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
        }

        .interactive { pointer-events: auto; }

        /* ЭФФЕКТ БЕЛОГО ЖИДКОГО СТЕКЛА ДЛЯ UI */
        .white-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            box-shadow: 0 10px 30px var(--shadow), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .white-glass:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .label-minimal {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(0, 0, 0, 0.4);
            margin-bottom: 0.5rem;
        }

        /* КНОПКИ МАГАЗИНА */
        .shop-card {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 180px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .shop-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .shop-card:hover::before {
            left: 100%;
        }

        .shop-card:active {
            transform: scale(0.95);
        }

        .shop-card:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* КУРСОР И ПОПАПЫ */
        .myats-text {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 2.2rem;
            color: #1a1a1a;
            z-index: 100;
            animation: myats-float 0.8s ease-out forwards;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        @keyframes myats-float {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -150px) scale(1.2); opacity: 0; }
        }

        /* ПРОГРЕСС-БАР */
        .xp-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin: 1.5rem 0;
        }

        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #222, #555);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* СЕЛЕКТОР СПЕКТРОВ */
        .spectrum-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .spectrum-btn.active {
            border-color: #000;
            transform: scale(1.3);
        }

        .spectrum-btn.locked {
            filter: contrast(0.5) brightness(0.8);
            cursor: not-allowed;
        }

        /* ДОСТИЖЕНИЯ */
        #achievements {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .ach-toast {
            padding: 0.75rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            animation: ach-slide 3s ease-in-out forwards;
        }

        @keyframes ach-slide {
            0% { transform: translateX(120%); }
            10%, 90% { transform: translateX(0); }
            100% { transform: translateX(120%); }
        }

    </style>
</head>
<body>

    <div id="bg-gradient"></div>

    <div id="ui-layer">
        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="flex justify-between items-start w-full">
            <div class="white-glass p-10 min-w-[360px] interactive">
                <div class="label-minimal">Кристаллизованный Свет</div>
                <div class="text-7xl font-extralight tracking-tighter mb-4" id="lux-counter">0</div>
                
                <div class="xp-container">
                    <div id="xp-fill" class="xp-fill"></div>
                </div>
                
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black uppercase tracking-widest" id="lvl-text">Уровень 1</span>
                    <span class="text-[10px] font-mono opacity-40" id="xp-text">0 / 100 XP</span>
                </div>

                <div class="border-t border-black/5 pt-6">
                    <div class="label-minimal">Огранённые Спектры</div>
                    <div id="spectrum-list" class="flex gap-4 mt-3"></div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="white-glass px-8 py-5 text-right">
                    <div class="label-minimal">Импульс</div>
                    <div class="text-3xl font-light" id="click-power-text">+1</div>
                </div>
                <div class="white-glass px-8 py-5 text-right">
                    <div class="label-minimal">Резонанс</div>
                    <div class="text-3xl font-light text-gray-500" id="auto-power-text">0/s</div>
                </div>
            </div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ / МАГАЗИН -->
        <div class="flex justify-center items-center gap-6 pb-4">
            <div class="white-glass p-4 flex gap-4 interactive">
                <button id="buy-click" class="white-glass shop-card">
                    <div class="label-minimal">Улучшение</div>
                    <div class="text-xl font-bold mb-1">Фокус</div>
                    <div class="text-[10px] font-mono opacity-50" id="cost-click">10 LUX</div>
                </button>
                
                <button id="buy-auto" class="white-glass shop-card">
                    <div class="label-minimal">Автоматика</div>
                    <div class="text-xl font-bold mb-1">Сенсор</div>
                    <div class="text-[10px] font-mono opacity-50" id="cost-auto">60 LUX</div>
                </button>
                
                <button id="buy-prestige" class="white-glass shop-card" disabled title="Требуется 50 уровень">
                    <div class="label-minimal">Ядро</div>
                    <div class="text-xl font-bold mb-1">Синтез</div>
                    <div class="text-[10px] font-mono opacity-50">LOCKED</div>
                </button>
            </div>
        </div>
    </div>

    <div id="achievements"></div>

    <script>
        /**
         * КВАНТОВЫЙ ДВИЖОК "МЯЦ"
         * Использование Web Audio API для процедурной генерации кошачьих звуков
         */
        const MyatsEngine = (() => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            const play = () => {
                if (ctx.state === 'suspended') ctx.resume();
                
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                // Характеристики "Мяц"
                osc.type = 'triangle';
                const baseFreq = 450 + Math.random() * 150;
                osc.frequency.setValueAtTime(baseFreq, now);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 2.5, now + 0.04);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.8, now + 0.2);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2000, now);
                filter.frequency.exponentialRampToValueAtTime(500, now + 0.2);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                osc.start();
                osc.stop(now + 0.3);
            };

            return { play };
        })();

        /**
         * ГРАФИЧЕСКИЙ ДВИЖОК: WHITE LIQUID GLASS
         */
        class Visuals {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.cat = new THREE.Group();
                this.particles = null;
                this.mouse = new THREE.Vector2();
                this.targetRot = new THREE.Vector2();
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                document.body.appendChild(this.renderer.domElement);

                this.camera.position.set(0, 1, 11);

                // ОСВЕЩЕНИЕ (Сложная схема для стекла)
                const amb = new THREE.AmbientLight(0xffffff, 0.4);
                this.scene.add(amb);

                const spot = new THREE.SpotLight(0xffffff, 1.5);
                spot.position.set(10, 20, 10);
                spot.castShadow = true;
                this.scene.add(spot);

                const rim = new THREE.PointLight(0xffffff, 2, 20);
                rim.position.set(-5, 0, 5);
                this.scene.add(rim);
                this.accentLight = rim;

                this.setupMaterials();
                this.buildCat();
                this.createParticles();
                this.animate();
            }

            setupMaterials() {
                // Продвинутое "Жидкое Белое Стекло"
                this.glassMat = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    metalness: 0.05,
                    roughness: 0.02,
                    transmission: 0.98,
                    thickness: 1.5,
                    ior: 1.52,
                    iridescence: 0.3,
                    iridescenceIOR: 1.3,
                    clearcoat: 1,
                    clearcoatRoughness: 0,
                    specularIntensity: 1,
                    transparent: true,
                    opacity: 1
                });

                this.eyeMat = new THREE.MeshStandardMaterial({
                    color: 0x111111,
                    roughness: 0,
                    metalness: 1
                });
            }

            buildCat() {
                // Голова
                const headGeo = new THREE.SphereGeometry(2.4, 64, 64);
                const head = new THREE.Mesh(headGeo, this.glassMat);
                this.cat.add(head);

                // Уши
                const earGeo = new THREE.ConeGeometry(0.8, 2, 4);
                const earL = new THREE.Mesh(earGeo, this.glassMat);
                earL.position.set(-1.4, 2.2, -0.2);
                earL.rotation.z = 0.3;
                this.cat.add(earL);

                const earR = new THREE.Mesh(earGeo, this.glassMat);
                earR.position.set(1.4, 2.2, -0.2);
                earR.rotation.z = -0.3;
                this.cat.add(earR);

                // Глаза
                const eyeGeo = new THREE.SphereGeometry(0.25, 32, 32);
                const eyeL = new THREE.Mesh(eyeGeo, this.eyeMat);
                eyeL.position.set(-0.9, 0.6, 2);
                this.cat.add(eyeL);

                const eyeR = new THREE.Mesh(eyeGeo, this.eyeMat);
                eyeR.position.set(0.9, 0.6, 2);
                this.cat.add(eyeR);

                // Лапки (маленькие выступы)
                const pawGeo = new THREE.SphereGeometry(0.5, 32, 32);
                const pawL = new THREE.Mesh(pawGeo, this.glassMat);
                pawL.position.set(-1.2, -2, 1.2);
                this.cat.add(pawL);

                const pawR = new THREE.Mesh(pawGeo, this.glassMat);
                pawR.position.set(1.2, -2, 1.2);
                this.cat.add(pawR);

                this.scene.add(this.cat);
            }

            createParticles() {
                const geo = new THREE.BufferGeometry();
                const count = 300;
                const pos = new Float32Array(count * 3);
                for(let i=0; i<count*3; i++) pos[i] = (Math.random()-0.5) * 20;
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                
                const mat = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.05,
                    transparent: true,
                    opacity: 0.4
                });
                
                this.particles = new THREE.Points(geo, mat);
                this.scene.add(this.particles);
            }

            onHit(x, y, colorHex) {
                // Анимация отдачи
                this.cat.scale.set(1.3, 0.8, 1.3);
                setTimeout(() => this.cat.scale.set(1, 1, 1), 100);
                
                // Всплывающее "Мяц"
                const div = document.createElement('div');
                div.className = 'myats-text';
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.color = colorHex;
                div.innerText = 'МЯЦ!';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 800);
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const t = Date.now() * 0.001;

                // Плавное вращение и парение
                this.cat.position.y = Math.sin(t * 1.5) * 0.2;
                this.cat.rotation.y += 0.004;
                
                // Слежение за мышью
                this.cat.rotation.x = THREE.MathUtils.lerp(this.cat.rotation.x, this.targetRot.y * 0.5, 0.1);
                this.cat.rotation.z = THREE.MathUtils.lerp(this.cat.rotation.z, -this.targetRot.x * 0.3, 0.1);

                // Частицы
                if(this.particles) {
                    this.particles.rotation.y += 0.001;
                    this.particles.position.y = Math.sin(t * 0.5) * 0.5;
                }

                this.renderer.render(this.scene, this.camera);
            }
        }

        /**
         * ИГРОВАЯ ЛОГИКА
         */
        const Game = {
            lux: 0,
            total: 0,
            lvl: 1,
            xp: 0,
            xpNext: 100,
            click: 1,
            auto: 0,
            costs: { click: 15, auto: 100 },
            
            spectrums: [
                { name: 'Pure', color: '#ffffff', ior: 1.52, req: 0 },
                { name: 'Rose', color: '#ffd1dc', ior: 1.7, req: 500 },
                { name: 'Cyan', color: '#e0ffff', ior: 1.9, req: 2500 },
                { name: 'Dark', color: '#222222', ior: 2.4, req: 10000 }
            ],
            currentSpec: 0,

            init() {
                this.vis = new Visuals();
                this.bindEvents();
                this.updateUI();
                this.startLoop();
            },

            bindEvents() {
                window.addEventListener('mousedown', (e) => this.handleClick(e));
                window.addEventListener('mousemove', (e) => {
                    this.vis.targetRot.x = (e.clientX / window.innerWidth) * 2 - 1;
                    this.vis.targetRot.y = -(e.clientY / window.innerHeight) * 2 + 1;
                });

                document.getElementById('buy-click').onclick = () => this.upgrade('click');
                document.getElementById('buy-auto').onclick = () => this.upgrade('auto');
                
                window.addEventListener('resize', () => {
                    this.vis.camera.aspect = window.innerWidth / window.innerHeight;
                    this.vis.camera.updateProjectionMatrix();
                    this.vis.renderer.setSize(window.innerWidth, window.innerHeight);
                });
            },

            handleClick(e) {
                const ray = new THREE.Raycaster();
                const mouse = new THREE.Vector2(
                    (e.clientX / window.innerWidth) * 2 - 1,
                    -(e.clientY / window.innerHeight) * 2 + 1
                );
                ray.setFromCamera(mouse, this.vis.camera);
                
                const hits = ray.intersectObjects(this.vis.cat.children);
                if(hits.length > 0) {
                    this.addLux(this.click);
                    this.vis.onHit(e.clientX, e.clientY, this.spectrums[this.currentSpec].color);
                    MyatsEngine.play();
                }
            },

            addLux(val) {
                this.lux += val;
                this.total += val;
                this.xp += val;
                
                if(this.xp >= this.xpNext) {
                    this.lvlUp();
                }
                this.updateUI();
            },

            lvlUp() {
                this.xp -= this.xpNext;
                this.lvl++;
                this.xpNext = Math.floor(this.xpNext * 1.5);
                this.notifyAchievement(`Уровень ${this.lvl} достигнут!`);
            },

            upgrade(type) {
                if(this.lux >= this.costs[type]) {
                    this.lux -= this.costs[type];
                    if(type === 'click') {
                        this.click += 1 + Math.floor(this.lvl / 5);
                        this.costs.click *= 1.8;
                    } else {
                        this.auto += 1;
                        this.costs.auto *= 2.1;
                    }
                    this.updateUI();
                }
            },

            updateUI() {
                document.getElementById('lux-counter').innerText = Math.floor(this.lux).toLocaleString();
                document.getElementById('click-power-text').innerText = `+${this.click}`;
                document.getElementById('auto-power-text').innerText = `${this.auto}/s`;
                
                document.getElementById('lvl-text').innerText = `Уровень ${this.lvl}`;
                document.getElementById('xp-text').innerText = `${Math.floor(this.xp)} / ${this.xpNext} XP`;
                document.getElementById('xp-fill').style.width = (this.xp / this.xpNext * 100) + '%';
                
                document.getElementById('cost-click').innerText = `${Math.floor(this.costs.click)} LUX`;
                document.getElementById('cost-auto').innerText = `${Math.floor(this.costs.auto)} LUX`;
                
                document.getElementById('buy-click').disabled = this.lux < this.costs.click;
                document.getElementById('buy-auto').disabled = this.lux < this.costs.auto;

                this.renderSpectrums();
            },

            renderSpectrums() {
                const list = document.getElementById('spectrum-list');
                list.innerHTML = '';
                this.spectrums.forEach((s, i) => {
                    const btn = document.createElement('div');
                    const locked = this.total < s.req;
                    btn.className = `spectrum-btn ${this.currentSpec === i ? 'active' : ''} ${locked ? 'locked' : ''}`;
                    btn.style.backgroundColor = s.color;
                    btn.onclick = () => {
                        if(!locked) {
                            this.currentSpec = i;
                            this.vis.glassMat.ior = s.ior;
                            this.vis.accentLight.color.set(s.color);
                            this.updateUI();
                        }
                    };
                    list.appendChild(btn);
                });
            },

            notifyAchievement(text) {
                const toast = document.createElement('div');
                toast.className = 'white-glass ach-toast';
                toast.innerText = text;
                document.getElementById('achievements').appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            startLoop() {
                setInterval(() => {
                    if(this.auto > 0) {
                        this.addLux(this.auto / 10);
                    }
                }, 100);
            }
        };

        window.onload = () => Game.init();

    </script>
</body>
</html>
